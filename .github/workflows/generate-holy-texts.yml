name: Generate Holy Texts TOC

on:
  push:
    paths:
      - "_holy_text/**/*.md"
      - "scripts/generateHolyTexts.mjs"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Generate holy texts table of contents
        run: node scripts/generateHolyTexts.mjs

      - name: Commit generated TOC (if changed)
        run: |
          if git status --porcelain | grep -q "src/generated/holyTexts.ts"; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add src/generated/holyTexts.ts
            git commit -m "chore: update holy texts TOC"
            git push
          fi

